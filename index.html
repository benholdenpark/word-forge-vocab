<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>단어 대장간 — 어휘 연습</title>
<meta name="description" content="영단어 철자 조합 연습 게임. 타이머 안에 흩어진 글자로 단어를 완성하세요.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1c1917;
    --bg-elevated:#25211d;
    --bg-panel:#2c2722;
    --iron:#3a3530;
    --iron-light:#4a443d;
    --ash:#ede8e1;
    --ash-dim:#a89f92;
    --ember:#e8543b;
    --ember-gold:#f2a93b;
    --quench:#3e7ca8;
    --quench-glow:#7fc4ef;
    --danger:#c43b2e;
    --radius:8px;
    --font-display:'Bebas Neue', sans-serif;
    --font-mono:'Space Grotesk', monospace;
    --font-body:'Noto Sans KR', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:
      radial-gradient(ellipse at 50% -10%, #2e2620 0%, transparent 55%),
      var(--bg);
    color:var(--ash);
    font-family:var(--font-body);
  }
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px 16px;}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;} }
  button{font-family:inherit;cursor:pointer;}
  button:focus-visible, a:focus-visible, input:focus-visible{outline:2px solid var(--ember-gold); outline-offset:2px;}

  .app{width:100%;max-width:480px;}
  .topbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;padding:0 4px;}
  .logo{font-family:var(--font-display);font-size:30px;letter-spacing:1px;color:var(--ash);}
  .logo span{color:var(--ember);}
  .icon-btn{
    background:var(--bg-elevated);border:1px solid var(--iron);color:var(--ash);
    width:34px;height:34px;border-radius:var(--radius);
    display:flex;align-items:center;justify-content:center;font-size:16px;
  }
  .icon-btn:hover{border-color:var(--iron-light);}

  .card{
    background:var(--bg-panel);border:1px solid var(--iron);
    border-radius:14px;padding:28px 22px;
    box-shadow:0 20px 50px -20px rgba(0,0,0,0.6);
  }

  /* start screen */
  .eyebrow{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ash-dim);margin-bottom:6px;}
  .headline{font-family:var(--font-display);font-size:36px;line-height:1.05;letter-spacing:1px;margin:0 0 10px;}
  .sub{color:var(--ash-dim);font-size:14px;line-height:1.6;margin-bottom:20px;}
  .visit-counter{
    font-size:12px;color:var(--ash-dim);background:var(--bg-elevated);
    border:1px solid var(--iron);border-radius:999px;padding:6px 12px;
    display:inline-flex;gap:10px;margin-bottom:18px;font-family:var(--font-mono);
  }

  .lesson-tabs{display:flex;gap:8px;margin-bottom:18px;}
  .lesson-tab{
    flex:1;padding:10px 6px;border-radius:var(--radius);border:1px solid var(--iron);
    background:var(--bg-elevated);color:var(--ash-dim);text-align:center;
  }
  .lesson-tab .name{font-size:13px;font-weight:700;color:var(--ash);}
  .lesson-tab .count{display:block;font-size:11px;margin-top:2px;}
  .lesson-tab.active{border-color:var(--ember-gold);background:var(--bg-panel);}
  .lesson-tab.active .count{color:var(--ember-gold);}
  .lesson-tab:hover{border-color:var(--iron-light);}

  .setting-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--bg-elevated);border:1px solid var(--iron);
    border-radius:var(--radius);padding:12px 14px;margin-bottom:18px;
  }
  .setting-label{font-size:14px;font-weight:500;}
  .setting-label small{display:block;color:var(--ash-dim);font-size:12px;font-weight:400;margin-top:2px;}
  .stepper{display:flex;align-items:center;gap:10px;}
  .stepper button{
    width:30px;height:30px;border-radius:6px;border:1px solid var(--iron);
    background:var(--bg-panel);color:var(--ash);font-size:16px;font-weight:700;
  }
  .stepper button:hover{border-color:var(--ember-gold);}
  .stepper .val{font-family:var(--font-mono);font-weight:700;font-size:16px;min-width:24px;text-align:center;}

  .btn{
    width:100%;border:none;border-radius:var(--radius);padding:14px 16px;
    font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;
    margin-bottom:10px;transition:transform .08s ease, filter .15s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-primary{background:linear-gradient(180deg, var(--ember-gold), var(--ember));color:#1c1917;}
  .btn-primary:hover:not(:disabled){filter:brightness(1.08);}
  .btn-secondary{background:var(--bg-elevated);border:1px solid var(--iron);color:var(--ash);}
  .btn-secondary:hover:not(:disabled){border-color:var(--iron-light);}
  .btn-ghost{background:transparent;border:1px solid var(--iron);color:var(--ash-dim);}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{margin-bottom:0;}

  /* game screen */
  .game-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .word-count{font-size:13px;color:var(--ash-dim);letter-spacing:0.5px;}
  .score-live{font-family:var(--font-mono);font-weight:700;font-size:16px;color:var(--ember-gold);}
  .heat-track{height:8px;border-radius:999px;background:var(--iron);overflow:hidden;margin-bottom:22px;}
  .heat-fill{height:100%;border-radius:999px;background:linear-gradient(90deg, var(--ember-gold), var(--ember));transition:width 0.2s linear, background .3s ease;}
  .heat-fill.low{background:linear-gradient(90deg, var(--danger), var(--ember));}

  .tiles{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px;min-height:56px;}
  .tile{
    width:44px;height:48px;border-radius:6px;
    background:linear-gradient(180deg, var(--iron-light), var(--iron));
    border:1px solid #554d43;color:var(--ash);font-family:var(--font-mono);font-weight:700;font-size:19px;
    display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 rgba(0,0,0,0.35);
    transition:transform .12s ease, opacity .12s ease;
  }
  .tile:hover:not(.used){transform:translateY(-2px);}
  .tile.used{opacity:0;pointer-events:none;transform:scale(0.8);}

  .slots{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px;}
  .slot{
    width:40px;height:46px;border-radius:6px;border:2px solid var(--iron);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-weight:700;font-size:18px;color:var(--ash);background:var(--bg-elevated);
    transition:border-color .15s ease, background .15s ease;
  }
  .slot.filled{border-color:var(--iron-light);}
  .slot.group-gap{margin-right:14px;}
  .slots.wrong .slot{animation:shake .4s ease;border-color:var(--danger);}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-5px);}40%{transform:translateX(5px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
  .slots.correct .slot{border-color:var(--quench);background:linear-gradient(180deg, var(--quench-glow), var(--quench));color:#0e2330;animation:quench .5s ease;}
  @keyframes quench{0%{transform:scale(1);}40%{transform:scale(1.12);}100%{transform:scale(1);}}

  .meaning-flash{
    text-align:center;min-height:20px;font-size:14px;color:var(--quench-glow);
    margin-bottom:16px;font-weight:600;
  }
  .hint-banner{
    text-align:center;font-size:13px;color:var(--ember-gold);
    min-height:18px;margin-bottom:14px;
  }

  .assist-row{display:flex;gap:10px;margin-bottom:10px;}
  .assist-btn{
    flex:1;background:var(--bg-elevated);border:1px solid var(--iron);color:var(--ash);
    border-radius:var(--radius);padding:11px 8px;font-size:13px;font-weight:600;
    display:flex;flex-direction:column;align-items:center;gap:2px;
  }
  .assist-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .assist-btn:not(:disabled):hover{border-color:var(--ember-gold);}
  .assist-btn small{color:var(--ash-dim);font-weight:400;}

  .pause-overlay{
    position:absolute;inset:0;background:rgba(28,25,23,0.92);border-radius:14px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  }
  .pause-overlay .headline{margin:0;}
  .game-wrap{position:relative;}

  .result-title{font-family:var(--font-display);font-size:32px;text-align:center;margin:0 0 6px;letter-spacing:1px;}
  .result-sub{text-align:center;color:var(--ash-dim);font-size:14px;margin-bottom:16px;}
  .result-score{text-align:center;font-family:var(--font-mono);font-weight:700;font-size:34px;color:var(--ember-gold);margin-bottom:16px;}
  .grid-emoji{text-align:center;font-size:20px;line-height:1.6;letter-spacing:2px;margin-bottom:18px;word-break:break-all;}

  .review-box{background:var(--bg-elevated);border:1px solid var(--iron);border-radius:var(--radius);padding:12px 14px;margin-bottom:16px;}
  .review-title{font-size:13px;font-weight:700;color:var(--ash-dim);margin-bottom:8px;letter-spacing:0.5px;}
  .review-item{display:flex;justify-content:space-between;gap:10px;font-size:14px;padding:4px 0;}
  .review-item .w{font-family:var(--font-mono);font-weight:700;white-space:nowrap;}
  .review-item .m{color:var(--ash-dim);text-align:right;}

  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal{background:var(--bg-panel);border:1px solid var(--iron);border-radius:14px;padding:22px;max-width:440px;width:100%;max-height:80vh;overflow-y:auto;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .modal-title{font-family:var(--font-display);font-size:24px;letter-spacing:1px;}
  .history-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--iron);font-size:13px;}
  .history-row:last-child{border-bottom:none;}
  .history-date{color:var(--ash-dim);}
  .history-stat{font-family:var(--font-mono);font-weight:700;color:var(--ember-gold);}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--iron-light);color:var(--ash);padding:10px 18px;border-radius:999px;
    font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,0.4);z-index:60;opacity:0;transition:opacity .25s ease;
  }
  .toast.show{opacity:1;}
  .hidden{display:none !important;}
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="logo">단어<span>대장간</span></div>
    <div style="display:flex;gap:8px;">
      <button class="icon-btn" id="btnLeaderboardTop" title="순위">🏆</button>
      <button class="icon-btn" id="btnHistoryTop" title="기록">📖</button>
    </div>
  </div>

  <div class="card">
    <!-- ============ START SCREEN ============ -->
    <div id="screen-start">
      <div class="eyebrow">VOCAB PRACTICE</div>
      <h1 class="headline">흩어진 글자로<br>영단어를 완성하세요.</h1>
      <p class="sub">레슨을 고르면 그 레슨 단어 중에서 무작위로 나옵니다. 타이머가 흐르는 동안 뒤섞인 알파벳으로 단어를 조립하세요.</p>
      <div class="visit-counter" id="visitCounter"></div>

      <div class="lesson-tabs" id="diffTabs"></div>
      <div class="lesson-tabs" id="lessonTabs"></div>
      <div class="lesson-tabs" id="caseTabs"></div>

      <div class="setting-row hidden" id="freeControls" style="flex-direction:column;align-items:stretch;gap:12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div class="setting-label">한 판에 나올 단어 수<small>이 레슨 단어: <span id="bankSize">0</span>개</small></div>
          <div class="stepper">
            <button id="stepDown">−</button>
            <div class="val" id="wordCountVal">18</div>
            <button id="stepUp">+</button>
          </div>
        </div>
        <div class="lesson-tabs" id="freeDisplayTabs" style="margin-bottom:0;"></div>
      </div>

      <div class="setting-row hidden" id="fixedInfo">
        <div class="setting-label" id="fixedInfoLabel">고정 단어 수</div>
      </div>

      <button class="btn btn-primary" id="btnPlay">연습 시작</button>
      <button class="btn btn-secondary" id="btnRelax">여유 모드 (타이머 없음)</button>
      <div class="btn-row" style="margin-bottom:10px;">
        <button class="btn btn-ghost" id="btnHistoryStart" style="margin-bottom:0;">지난 기록 보기</button>
        <button class="btn btn-ghost" id="btnLeaderboardStart" style="margin-bottom:0;">순위 보기</button>
      </div>
    </div>

    <!-- ============ GAME SCREEN ============ -->
    <div id="screen-game" class="hidden">
      <div class="game-wrap">
        <div class="game-meta">
          <span class="word-count" id="wordCount">1 / 18</span>
          <span class="score-live" id="elapsedDisplay">⏱ 0:00</span>
          <span class="score-live" id="scoreLive">0 pts</span>
        </div>
        <div class="heat-track"><div class="heat-fill" id="heatFill" style="width:100%"></div></div>

        <div class="tiles" id="tiles"></div>
        <div class="slots" id="slots"></div>
        <div class="hint-banner" id="hintBanner"></div>
        <div class="meaning-flash" id="meaningFlash"></div>

        <div class="assist-row">
          <button class="assist-btn" id="btnReveal">🔩 글자 공개<small id="revealCount">3회 남음</small></button>
        </div>
        <button class="btn btn-ghost" id="btnPause">일시정지</button>

        <div class="pause-overlay hidden" id="pauseOverlay">
          <div class="headline">일시정지</div>
          <button class="btn btn-primary" id="btnResume" style="width:180px;">계속하기</button>
          <button class="btn btn-secondary" id="btnRestart" style="width:180px;">다시 시작</button>
          <button class="btn btn-ghost" id="btnQuitHome" style="width:180px;">처음으로</button>
        </div>
      </div>
    </div>

    <!-- ============ END SCREEN ============ -->
    <div id="screen-end" class="hidden">
      <div class="result-title" id="resultTitle">완성!</div>
      <div class="result-sub" id="resultSub">0 / 18개 단어 완성</div>
      <div class="result-score" id="resultScore">0 pts</div>
      <div class="result-sub" id="resultTime" style="margin-bottom:16px;">완료 시간: 0:00</div>
      <div class="grid-emoji" id="resultGrid"></div>

      <div class="review-box hidden" id="reviewBox">
        <div class="review-title">다시 볼 단어</div>
        <div id="reviewList"></div>
      </div>

      <div class="setting-row" style="gap:8px;">
        <input type="text" id="playerName" placeholder="이름 입력 (리더보드용)" maxlength="12"
          style="flex:1;background:var(--bg-panel);border:1px solid var(--iron);color:var(--ash);border-radius:6px;padding:9px 10px;font-family:inherit;font-size:13px;">
        <button class="btn btn-secondary" id="btnSubmitScore" style="width:auto;margin-bottom:0;white-space:nowrap;">순위 등록</button>
      </div>

      <div class="btn-row" style="margin-bottom:10px;">
        <button class="btn btn-secondary" id="btnShare">점수 공유</button>
        <button class="btn btn-secondary" id="btnPracticeAgain">새 문제 다시 도전</button>
      </div>
      <button class="btn btn-ghost" id="btnBackHome">처음으로</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ============ HISTORY MODAL ============ -->
<div class="modal-backdrop hidden" id="modalHistory">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">지난 기록</div>
      <button class="icon-btn" id="closeHistory">✕</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<!-- ============ LEADERBOARD MODAL ============ -->
<div class="modal-backdrop hidden" id="modalLeaderboard">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">순위표</div>
      <button class="icon-btn" id="closeLeaderboard">✕</button>
    </div>
    <div class="lesson-tabs" id="lbDiffTabs" style="margin-bottom:14px;"></div>
    <div id="lbNote" style="font-size:12px;color:var(--ash-dim);margin-bottom:10px;"></div>
    <div id="leaderboardList"></div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ======================================================================
     CONFIG — 레슨별로 단어를 관리합니다.
     word: 영단어(구는 띄어쓰기 포함 가능, 예: "life jacket")
     meaning: 학생에게 보여줄 한글 뜻
     def: 초급/중급 난이도에서 보여줄 쉬운 영어 뜻풀이 (직접 작성)
     pos: 품사 표시용 (동사/명사/형용사/부사 등, 없으면 빈 문자열)

     레슨을 추가하려면 아래 LESSONS 객체에 같은 형식으로
     항목을 채워 넣으세요. 단어 수 제한은 없습니다.
  ====================================================================== */
  const LESSONS = {
    "5": [
      {word:"add", meaning:"추가하다", def:"to put something together with something else to make a bigger group or total", pos:"동사"},
      {word:"adventure", meaning:"모험", def:"an exciting experience or journey that often involves some risk", pos:"명사"},
      {word:"app", meaning:"응용 프로그램, 앱", def:"a small computer program used on a phone or tablet", pos:"명사"},
      {word:"background", meaning:"배경, 환경", def:"the area or setting behind the main thing you see, or a person's past experiences", pos:"명사"},
      {word:"be interested in", meaning:"~에 관심이 있다", def:"to want to know more about something or enjoy doing it", pos:"동사"},
      {word:"be into", meaning:"~에 관심이 있다", def:"to really like or enjoy a particular activity or subject", pos:"동사"},
      {word:"begin", meaning:"시작하다", def:"to start doing something", pos:"동사"},
      {word:"cap", meaning:"모자", def:"a soft hat, usually with a curved part at the front", pos:"명사"},
      {word:"character", meaning:"등장인물, 주인공", def:"a person in a story, movie, or game", pos:"명사"},
      {word:"code", meaning:"코드화하다, 코딩하다", def:"instructions written for a computer to follow", pos:"동사"},
      {word:"cool", meaning:"멋진", def:"fashionable and impressive, in a relaxed way", pos:"형용사"},
      {word:"corner", meaning:"구석, 모서리, 모퉁이", def:"the point where two lines, walls, or streets meet", pos:"명사"},
      {word:"dancer", meaning:"댄서", def:"a person who moves to music as a performance or art", pos:"명사"},
      {word:"draw", meaning:"그리다", def:"to make a picture using a pen or pencil", pos:"동사"},
      {word:"enjoy", meaning:"즐기다", def:"to get pleasure from doing something", pos:"동사"},
      {word:"exciting", meaning:"신나는, 흥미진진한", def:"causing strong feelings of interest or eagerness", pos:"형용사"},
      {word:"factory", meaning:"공장", def:"a large building where goods are made in large amounts", pos:"명사"},
      {word:"famous", meaning:"유명한", def:"known by a great many people", pos:"형용사"},
      {word:"finally", meaning:"마침내", def:"after a long time or a series of events, at last", pos:"부사"},
      {word:"future", meaning:"미래", def:"the time that has not happened yet", pos:"명사"},
      {word:"giant", meaning:"거대한", def:"extremely large in size", pos:"형용사"},
      {word:"go through", meaning:"거쳐 가다, 통과하다", def:"to experience something, often something difficult, from start to end", pos:"동사"},
      {word:"great", meaning:"멋진, 대단한", def:"very good, impressive, or large in amount", pos:"형용사"},
      {word:"hobby", meaning:"취미", def:"an activity you do in your free time because you enjoy it", pos:"명사"},
      {word:"interesting", meaning:"재미있는, 흥미로운", def:"holding your attention because it is unusual or enjoyable", pos:"형용사"},
      {word:"introduce", meaning:"소개하다", def:"to tell someone another person's name for the first time, or to bring something new", pos:"동사"},
      {word:"island", meaning:"섬", def:"a piece of land completely surrounded by water", pos:"명사"},

  // 리더보드를 여러 사람과 공유하려면, Google Apps Script로 만든 웹앱 URL을
  // 여기에 넣으세요 (설정 방법은 파일 하단 안내 주석 참고). 비워두면
  // 이 브라우저 안에서만 기록이 저장됩니다.
  const LEADERBOARD_ENDPOINT = 'https://script.google.com/macros/s/AKfycbyNxSeZw7qrcUUcpY9uig8Vdyy6m_HhYKAQIP9GM_MVQOw1Ay6To-KAYpTEmtPeNXvF6w/exec';

  const GAME_TIME = 90;
  const TIME_BONUS = 4;
  const WRONG_PENALTY = 2;
  const REVEAL_PENALTY = 15;
  const MAX_REVEALS = 3;

  const HISTORY_KEY = 'wordforge_vocab_history_v1';
  const VISIT_LAST_KEY = 'wordforge_vocab_last_visit_date_v1';
  const VISIT_LOCAL_KEY = 'wordforge_vocab_visits_local_v1';
  const COUNT_KEY = 'wordforge_vocab_wordcount_v1';
  const LESSON_KEY = 'wordforge_vocab_lesson_v1';
  const DIFF_KEY = 'wordforge_vocab_difficulty_v1';
  const FREE_DISPLAY_KEY = 'wordforge_vocab_free_display_v1';
  const CASE_KEY = 'wordforge_vocab_case_v1';
  const CASE_OPTIONS = [
    { key:'upper', label:'대문자' },
    { key:'lower', label:'소문자' }
  ];
  const LOCAL_LEADERBOARD_KEY = 'wordforge_vocab_leaderboard_local_v1';

  /* ---------------------------------------------------------------------
     Helpers
  --------------------------------------------------------------------- */
  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }
  function loadHistory(){
    try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }catch(e){ return []; }
  }
  function saveHistory(list){
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0,20)));
  }
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2200);
  }
  function letterCount(entry){
    return entry.word.replace(/\s+/g,'').length;
  }
  function groupLengths(entry){
    return entry.word.split(' ').map(w=>w.length);
  }
  const el = (id)=>document.getElementById(id);

  /* ---------------------------------------------------------------------
     Lesson + difficulty + round-length selection
  --------------------------------------------------------------------- */
  let selectedLesson = localStorage.getItem(LESSON_KEY);
  if(!selectedLesson || !LESSONS[selectedLesson]){
    selectedLesson = LESSON_ORDER.find(k=>LESSONS[k].length > 0) || LESSON_ORDER[0];
  }
  let selectedDifficulty = localStorage.getItem(DIFF_KEY) || 'beginner';
  if(!DIFFICULTIES.some(d=>d.key === selectedDifficulty)) selectedDifficulty = 'beginner';
  let wordCount = parseInt(localStorage.getItem(COUNT_KEY), 10) || 18;

  function currentLessonWords(){
    return LESSONS[selectedLesson] || [];
  }

  let selectedFreeDisplay = localStorage.getItem(FREE_DISPLAY_KEY) || 'meaning';
  if(!FREE_DISPLAY_OPTIONS.some(o=>o.key === selectedFreeDisplay)) selectedFreeDisplay = 'meaning';

  let selectedCase = localStorage.getItem(CASE_KEY) || 'upper';
  if(!CASE_OPTIONS.some(o=>o.key === selectedCase)) selectedCase = 'upper';

  function applyCase(str){
    return selectedCase === 'lower' ? str.toLowerCase() : str.toUpperCase();
  }

  function renderCaseTabs(){
    const wrap = el('caseTabs');
    wrap.innerHTML = '';
    CASE_OPTIONS.forEach(o=>{
      const btn = document.createElement('button');
      btn.className = 'lesson-tab' + (o.key === selectedCase ? ' active' : '');
      btn.innerHTML = `<span class="name">${o.label}</span>`;
      btn.addEventListener('click', ()=>{
        selectedCase = o.key;
        localStorage.setItem(CASE_KEY, o.key);
        renderCaseTabs();
        if(state){ renderTiles(); renderSlots(); }
      });
      wrap.appendChild(btn);
    });
  }

  function renderDiffTabs(){
    const wrap = el('diffTabs');
    wrap.innerHTML = '';
    DIFFICULTIES.forEach(d=>{
      const btn = document.createElement('button');
      btn.className = 'lesson-tab' + (d.key === selectedDifficulty ? ' active' : '');
      btn.innerHTML = `<span class="name">${d.label}</span>`;
      btn.addEventListener('click', ()=>{
        selectedDifficulty = d.key;
        localStorage.setItem(DIFF_KEY, d.key);
        renderSettings();
      });
      wrap.appendChild(btn);
    });
  }

  function renderFreeDisplayTabs(){
    const wrap = el('freeDisplayTabs');
    wrap.innerHTML = '';
    FREE_DISPLAY_OPTIONS.forEach(o=>{
      const btn = document.createElement('button');
      btn.className = 'lesson-tab' + (o.key === selectedFreeDisplay ? ' active' : '');
      btn.innerHTML = `<span class="name">${o.label}</span>`;
      btn.addEventListener('click', ()=>{
        selectedFreeDisplay = o.key;
        localStorage.setItem(FREE_DISPLAY_KEY, o.key);
        renderFreeDisplayTabs();
      });
      wrap.appendChild(btn);
    });
  }

  function renderLessonTabs(){
    const wrap = el('lessonTabs');
    wrap.innerHTML = '';
    LESSON_ORDER.forEach(key=>{
      const words = LESSONS[key] || [];
      const btn = document.createElement('button');
      btn.className = 'lesson-tab' + (key === selectedLesson ? ' active' : '');
      btn.innerHTML = `<span class="name">Lesson ${key}</span><span class="count">${words.length}개</span>`;
      btn.addEventListener('click', ()=>{
        selectedLesson = key;
        localStorage.setItem(LESSON_KEY, key);
        renderSettings();
      });
      wrap.appendChild(btn);
    });
  }

  function effectiveRoundCount(total){
    if(selectedDifficulty === 'free'){
      const minC = Math.min(5, Math.max(1, total));
      return total > 0 ? Math.max(minC, Math.min(total, wordCount)) : 0;
    }
    return Math.min(FIXED_COUNTS[selectedDifficulty] || total, total);
  }

  function renderSettings(){
    renderDiffTabs();
    renderFreeDisplayTabs();
    renderLessonTabs();
    renderCaseTabs();
    const total = currentLessonWords().length;
    const isFree = selectedDifficulty === 'free';

    el('freeControls').classList.toggle('hidden', !isFree);
    el('fixedInfo').classList.toggle('hidden', isFree);

    if(isFree){
      const minC = Math.min(5, Math.max(1, total));
      wordCount = total > 0 ? Math.max(minC, Math.min(total, wordCount)) : 0;
      localStorage.setItem(COUNT_KEY, wordCount);
      el('bankSize').textContent = total;
      el('wordCountVal').textContent = wordCount;
      el('stepDown').disabled = total === 0;
      el('stepUp').disabled = total === 0;
    } else {
      const fixed = selectedDifficulty === 'beginner' ? total : Math.min(FIXED_COUNTS[selectedDifficulty] || 0, total);
      const fixedText = selectedDifficulty === 'beginner' ? `전체 ${fixed}개` : `${fixed}개`;
      el('fixedInfoLabel').textContent = `고정 단어 수: ${fixedText} (이 레슨 보유 ${total}개)`;
    }

    const empty = total === 0;
    el('btnPlay').disabled = empty;
    el('btnRelax').disabled = empty;
    if(empty) showToast(`Lesson ${selectedLesson}에는 아직 단어가 없어요`);
  }

  el('stepDown').addEventListener('click', ()=>{
    const total = currentLessonWords().length;
    const minC = Math.min(5, Math.max(1, total));
    wordCount = Math.max(minC, wordCount - 1);
    localStorage.setItem(COUNT_KEY, wordCount);
    el('wordCountVal').textContent = wordCount;
  });
  el('stepUp').addEventListener('click', ()=>{
    const total = currentLessonWords().length;
    wordCount = Math.min(total, wordCount + 1);
    localStorage.setItem(COUNT_KEY, wordCount);
    el('wordCountVal').textContent = wordCount;
  });

  /* ---------------------------------------------------------------------
     State
  --------------------------------------------------------------------- */
  let state = null;
  const screenStart = el('screen-start');
  const screenGame = el('screen-game');
  const screenEnd = el('screen-end');

  function startGame(mode){
    const pool = currentLessonWords();
    if(pool.length === 0){
      showToast(`Lesson ${selectedLesson}에는 아직 단어가 없어요`);
      return;
    }
    const roundWords = shuffle(pool).slice(0, effectiveRoundCount(pool.length) || pool.length);
    state = {
      mode, // 'practice' | 'relax'
      lesson: selectedLesson,
      difficulty: selectedDifficulty,
      freeDisplay: selectedFreeDisplay,
      words: roundWords,
      wordIdx: 0,
      score: 0,
      solvedCount: 0,
      timeLeft: GAME_TIME,
      timerId: null,
      revealsLeft: MAX_REVEALS,
      revealsUsedThisWord: 0,
      resultsGrid: [],
      missed: [],
      tiles: [],
      slots: [],
      paused: false,
      startedAt: Date.now(),
      totalPausedMs: 0,
      pausedAt: null,
      elapsedMs: 0
    };
    screenStart.classList.add('hidden');
    screenEnd.classList.add('hidden');
    screenGame.classList.remove('hidden');
    el('pauseOverlay').classList.add('hidden');
    setupWord(0);
    startStopwatch();
    if(mode !== 'relax'){
      startTimer();
    } else {
      el('heatFill').style.width = '100%';
    }
  }

  function startStopwatch(){
    if(state.stopwatchId) clearInterval(state.stopwatchId);
    state.stopwatchId = setInterval(tickStopwatch, 250);
    tickStopwatch();
  }

  function tickStopwatch(){
    if(!state || state.paused) return;
    const elapsed = Math.max(0, Date.now() - state.startedAt - state.totalPausedMs);
    el('elapsedDisplay').textContent = `⏱ ${formatElapsed(elapsed)}`;
  }

  function startTimer(){
    if(state.timerId) clearInterval(state.timerId);
    state.endsAt = Date.now() + state.timeLeft * 1000;
    state.timerId = setInterval(tickTimer, 200);
  }

  function tickTimer(){
    if(!state || state.paused) return;
    const remainingMs = state.endsAt - Date.now();
    state.timeLeft = Math.max(0, Math.ceil(remainingMs / 1000));
    renderHeat();
    if(remainingMs <= 0){
      state.timeLeft = 0;
      renderHeat();
      endGame(false);
    }
  }

  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState === 'visible'){
      tickTimer();
      tickStopwatch();
    }
  });

  function renderHeat(){
    const pct = Math.max(0, Math.min(100, (state.timeLeft / GAME_TIME) * 100));
    const fill = el('heatFill');
    fill.style.width = pct + '%';
    fill.classList.toggle('low', state.timeLeft <= 15);
  }

  function setupWord(idx){
    state.wordIdx = idx;
    state.revealsUsedThisWord = 0;
    el('hintBanner').textContent = '';
    el('meaningFlash').textContent = '';
    const entry = state.words[idx];
    const letters = entry.word.replace(/\s+/g,'').toLowerCase();
    let scrambled = shuffle(letters.split(''));
    if(letters.length > 1){
      let attempts = 0;
      while(scrambled.join('') === letters && attempts < 10){
        scrambled = shuffle(letters.split(''));
        attempts++;
      }
    }
    state.tiles = scrambled.map((letter, i)=>({ id:i, letter, used:false }));
    state.slots = letters.split('').map(()=>({ value:null, tileId:null }));
    state.groups = groupLengths(entry);

    if(state.difficulty === 'free'){
      if(state.freeDisplay === 'meaning'){
        el('hintBanner').textContent = `뜻: ${entry.meaning}`;
      } else {
        el('hintBanner').textContent = `def: ${entry.def}`;
      }
    } else if(state.difficulty === 'beginner'){
      el('hintBanner').textContent = `뜻: ${entry.meaning}`;
    } else if(state.difficulty === 'expert'){
      el('hintBanner').textContent = `def: ${entry.def}`;
    } else {
      el('hintBanner').textContent = '';
    }

    el('wordCount').textContent = state.mode === 'relax'
      ? `${idx+1} / ${state.words.length} · 여유 모드`
      : `${idx+1} / ${state.words.length}`;
    el('scoreLive').textContent = `${state.score} pts`;
    updateAssistButtons();
    renderTiles();
    renderSlots();
  }

  function renderTiles(){
    const wrap = el('tiles');
    wrap.innerHTML = '';
    state.tiles.forEach(t=>{
      const b = document.createElement('button');
      b.className = 'tile' + (t.used ? ' used' : '');
      b.textContent = applyCase(t.letter);
      b.disabled = t.used;
      b.addEventListener('click', ()=>placeTile(t.id));
      wrap.appendChild(b);
    });
  }

  function renderSlots(){
    const wrap = el('slots');
    wrap.classList.remove('wrong','correct');
    wrap.innerHTML = '';
    // figure out which slot indices are the last letter of a group (for phrase spacing)
    const gapAfter = new Set();
    let running = 0;
    (state.groups || []).forEach((len, gi)=>{
      running += len;
      if(gi < state.groups.length - 1) gapAfter.add(running - 1);
    });
    state.slots.forEach((s, i)=>{
      const d = document.createElement('div');
      d.className = 'slot' + (s.value ? ' filled' : '') + (gapAfter.has(i) ? ' group-gap' : '');
      d.textContent = s.value ? applyCase(s.value) : '';
      d.addEventListener('click', ()=>{ if(s.value) removeSlotBack(s); });
      wrap.appendChild(d);
    });
  }

  function removeSlotBack(targetSlot){
    const idx = state.slots.indexOf(targetSlot);
    for(let i = state.slots.length - 1; i >= idx; i--){
      const s = state.slots[i];
      if(s.tileId !== null){
        const tile = state.tiles.find(t=>t.id === s.tileId);
        if(tile) tile.used = false;
        s.value = null;
        s.tileId = null;
      }
    }
    renderTiles();
    renderSlots();
  }

  function placeTile(tileId){
    const tile = state.tiles.find(t=>t.id === tileId);
    if(!tile || tile.used) return;
    const emptySlot = state.slots.find(s=>s.value === null);
    if(!emptySlot) return;
    emptySlot.value = tile.letter;
    emptySlot.tileId = tile.id;
    tile.used = true;
    renderTiles();
    renderSlots();
    if(state.slots.every(s=>s.value !== null)) checkAnswer();
  }

  /* ---------------------------------------------------------------------
     Sound effects (synthesized tones via Web Audio API — no audio files)
  --------------------------------------------------------------------- */
  let audioCtx = null;
  function getAudioCtx(){
    if(!audioCtx){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(!Ctx) return null;
      audioCtx = new Ctx();
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playTone(freq, duration, type, delay, peakGain){
    const ctx = getAudioCtx();
    if(!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    const startAt = ctx.currentTime + (delay || 0);
    gain.gain.setValueAtTime(0.0001, startAt);
    gain.gain.exponentialRampToValueAtTime(peakGain || 0.15, startAt + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(startAt);
    osc.stop(startAt + duration + 0.02);
  }
  function playCorrectSound(){
    playTone(659.25, 0.11, 'sine', 0, 0.14);
    playTone(880.00, 0.16, 'sine', 0.09, 0.14);
  }
  function playWrongSound(){
    playTone(220, 0.09, 'square', 0, 0.10);
    playTone(160, 0.16, 'square', 0.08, 0.10);
  }

  function checkAnswer(){
    const assembled = state.slots.map(s=>s.value).join('').toLowerCase();
    const entry = state.words[state.wordIdx];
    const target = entry.word.replace(/\s+/g,'').toLowerCase();
    const wrap = el('slots');
    if(assembled === target){
      wrap.classList.add('correct');
      playCorrectSound();
      const status = (state.revealsUsedThisWord === 0) ? 'clean' : 'assisted';
      state.resultsGrid.push(status);
      if(status === 'assisted') state.missed.push(entry);
      const base = Math.max(10, 100 - state.revealsUsedThisWord*REVEAL_PENALTY);
      state.score += base;
      state.solvedCount += 1;
      if(state.mode !== 'relax'){
        state.endsAt += TIME_BONUS * 1000;
        state.timeLeft = Math.max(0, Math.ceil((state.endsAt - Date.now()) / 1000));
        renderHeat();
      }
      el('scoreLive').textContent = `${state.score} pts`;
      const posTag = entry.pos ? ` (${entry.pos})` : '';
      el('meaningFlash').textContent = `${entry.word} — ${entry.meaning}${posTag}`;
      setTimeout(()=>{
        if(state.wordIdx + 1 >= state.words.length){
          endGame(true);
        } else {
          setupWord(state.wordIdx + 1);
        }
      }, 700);
    } else {
      wrap.classList.add('wrong');
      playWrongSound();
      if(state.mode !== 'relax'){
        state.endsAt -= WRONG_PENALTY * 1000;
        state.timeLeft = Math.max(0, Math.ceil((state.endsAt - Date.now()) / 1000));
        renderHeat();
      }
      setTimeout(()=>{
        state.slots.forEach(s=>{ s.value = null; s.tileId = null; });
        state.tiles.forEach(t=>t.used = false);
        renderTiles();
        renderSlots();
        if(state.mode !== 'relax' && state.timeLeft <= 0) endGame(false);
      }, 500);
    }
  }

  function updateAssistButtons(){
    el('revealCount').textContent = `${state.revealsLeft}회 남음`;
    el('btnReveal').disabled = state.revealsLeft <= 0 || state.slots.every(s=>s.value !== null);
  }

  function useReveal(){
    if(state.revealsLeft <= 0) return;
    const emptyIdx = state.slots.findIndex(s=>s.value === null);
    if(emptyIdx === -1) return;
    const entry = state.words[state.wordIdx];
    const letters = entry.word.replace(/\s+/g,'').toLowerCase();
    const correctLetter = letters[emptyIdx];
    const tile = state.tiles.find(t=>!t.used && t.letter.toLowerCase() === correctLetter.toLowerCase());
    if(!tile) return;
    tile.used = true;
    state.slots[emptyIdx].value = tile.letter;
    state.slots[emptyIdx].tileId = tile.id;
    state.revealsLeft -= 1;
    state.revealsUsedThisWord += 1;
    renderTiles();
    renderSlots();
    updateAssistButtons();
    if(state.slots.every(s=>s.value !== null)) checkAnswer();
  }

  /* ---------------------------------------------------------------------
     End game
  --------------------------------------------------------------------- */
  function formatElapsed(ms){
    const totalSec = Math.max(0, Math.round(ms / 1000));
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return `${m}:${String(s).padStart(2,'0')}`;
  }

  function endGame(completedAll){
    if(state.timerId) clearInterval(state.timerId);
    if(state.stopwatchId) clearInterval(state.stopwatchId);
    while(state.resultsGrid.length < state.words.length){
      state.resultsGrid.push('unreached');
      state.missed.push(state.words[state.resultsGrid.length - 1]);
    }

    state.elapsedMs = Math.max(0, Date.now() - state.startedAt - state.totalPausedMs);

    if(state.mode !== 'relax'){
      const history = loadHistory();
      history.unshift({
        date: new Date().toISOString(),
        lesson: state.lesson,
        solved: state.solvedCount,
        total: state.words.length,
        score: state.score,
        elapsedMs: state.elapsedMs
      });
      saveHistory(history);
    }

    screenGame.classList.add('hidden');
    screenEnd.classList.remove('hidden');
    el('resultTitle').textContent = completedAll ? '완성!' : '시간 종료';
    const diffLabel = (DIFFICULTIES.find(d=>d.key===state.difficulty) || {}).label || state.difficulty;
    el('resultSub').textContent = `Lesson ${state.lesson} · ${diffLabel} · ${state.solvedCount} / ${state.words.length}개 단어 완성`;
    el('resultScore').textContent = `${state.score} pts`;
    el('resultTime').textContent = `완료 시간: ${formatElapsed(state.elapsedMs)}`;
    el('playerName').value = '';
    el('btnSubmitScore').disabled = false;
    el('btnSubmitScore').textContent = '순위 등록';

    const emojiMap = { clean:'🟧', assisted:'🟨', unreached:'⬜' };
    el('resultGrid').textContent = state.resultsGrid.map(s=>emojiMap[s] || '⬛').join('');

    const reviewBox = el('reviewBox');
    const reviewList = el('reviewList');
    reviewList.innerHTML = '';
    if(state.missed.length > 0){
      reviewBox.classList.remove('hidden');
      state.missed.forEach(m=>{
        const row = document.createElement('div');
        row.className = 'review-item';
        row.innerHTML = `<span class="w">${m.word}</span><span class="m">${m.meaning}</span>`;
        reviewList.appendChild(row);
      });
    } else {
      reviewBox.classList.add('hidden');
    }
  }

  /* ---------------------------------------------------------------------
     Pause / resume / restart
  --------------------------------------------------------------------- */
  function pauseGame(){
    if(!state) return;
    state.paused = true;
    state.pausedAt = Date.now();
    el('pauseOverlay').classList.remove('hidden');
  }
  function resumeGame(){
    if(state.pausedAt){
      const pausedDuration = Date.now() - state.pausedAt;
      state.totalPausedMs += pausedDuration;
      if(state.mode !== 'relax' && state.endsAt){
        state.endsAt += pausedDuration;
      }
    }
    state.pausedAt = null;
    state.paused = false;
    el('pauseOverlay').classList.add('hidden');
  }
  function restartGame(){
    const mode = state.mode;
    resumeGame();
    startGame(mode);
  }
  function quitToHome(){
    if(state && state.timerId) clearInterval(state.timerId);
    if(state && state.stopwatchId) clearInterval(state.stopwatchId);
    state = null;
    el('pauseOverlay').classList.add('hidden');
    screenGame.classList.add('hidden');
    screenStart.classList.remove('hidden');
    renderSettings();
  }

  /* ---------------------------------------------------------------------
     Share
  --------------------------------------------------------------------- */
  function shareScore(){
    const emojiMap = { clean:'🟧', assisted:'🟨', unreached:'⬜' };
    const grid = state.resultsGrid.map(s=>emojiMap[s] || '⬛').join('');
    const text = `단어 대장간 Lesson ${state.lesson} — ${state.solvedCount}/${state.words.length} 완성 🔥\n${grid}\n점수: ${state.score}pts`;
    if(navigator.share){
      navigator.share({ text }).catch(()=>{});
    } else if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(()=>showToast('결과가 복사되었습니다'));
    } else {
      showToast(text);
    }
  }

  /* ---------------------------------------------------------------------
     History modal
  --------------------------------------------------------------------- */
  function renderHistory(){
    const list = el('historyList');
    const history = loadHistory();
    list.innerHTML = '';
    if(history.length === 0){
      list.innerHTML = '<div class="history-row"><span class="history-date">아직 기록이 없어요</span></div>';
      return;
    }
    history.forEach(h=>{
      const d = new Date(h.date);
      const row = document.createElement('div');
      row.className = 'history-row';
      row.innerHTML = `<span class="history-date">Lesson ${h.lesson} · ${d.toLocaleDateString('ko-KR')} ${d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</span><span class="history-stat">${h.solved}/${h.total} · ${h.score}pts${h.elapsedMs != null ? ' · ' + formatElapsed(h.elapsedMs) : ''}</span>`;
      list.appendChild(row);
    });
  }

  /* ---------------------------------------------------------------------
     Leaderboard (per difficulty level, top 10)
     - If LEADERBOARD_ENDPOINT is set, records are fetched/submitted there
       so everyone sharing the deployed page sees the same board.
     - If not set, records are only stored in this browser (localStorage),
       which is fine for solo testing but won't be shared across devices.
     See the setup guide near the end of this file to wire up a free,
     shared backend using Google Apps Script.
  --------------------------------------------------------------------- */
  function loadLocalLeaderboard(){
    try{ return JSON.parse(localStorage.getItem(LOCAL_LEADERBOARD_KEY)) || []; }catch(e){ return []; }
  }
  function saveLocalLeaderboard(list){
    localStorage.setItem(LOCAL_LEADERBOARD_KEY, JSON.stringify(list.slice(0,500)));
  }
  async function fetchAllRecords(){
    if(LEADERBOARD_ENDPOINT){
      try{
        const res = await fetch(LEADERBOARD_ENDPOINT);
        const data = await res.json();
        return Array.isArray(data) ? data : [];
      }catch(e){
        showToast('리더보드 서버에 연결할 수 없어요');
        return loadLocalLeaderboard();
      }
    }
    return loadLocalLeaderboard();
  }
  async function submitRecord(record){
    if(LEADERBOARD_ENDPOINT){
      try{
        await fetch(LEADERBOARD_ENDPOINT, { method:'POST', body: JSON.stringify(record) });
        return true;
      }catch(e){
        showToast('전송 실패, 이 기기에만 저장할게요');
      }
    }
    const list = loadLocalLeaderboard();
    list.unshift(record);
    saveLocalLeaderboard(list);
    return true;
  }

  let lbSelectedDiff = 'free';
  function renderLbTabs(){
    const wrap = el('lbDiffTabs');
    wrap.innerHTML = '';
    DIFFICULTIES.forEach(d=>{
      const btn = document.createElement('button');
      btn.className = 'lesson-tab' + (d.key === lbSelectedDiff ? ' active' : '');
      btn.innerHTML = `<span class="name">${d.label}</span>`;
      btn.addEventListener('click', ()=>{
        lbSelectedDiff = d.key;
        renderLbTabs();
        loadAndRenderLeaderboard();
      });
      wrap.appendChild(btn);
    });
  }
  async function loadAndRenderLeaderboard(){
    const list = el('leaderboardList');
    list.innerHTML = '<div class="history-row"><span class="history-date">불러오는 중…</span></div>';
    el('lbNote').textContent = LEADERBOARD_ENDPOINT
      ? '모두에게 공유되는 순위표입니다.'
      : '이 브라우저에만 저장된 순위표예요 (다른 기기와 공유하려면 안내 주석을 참고하세요).';
    const all = await fetchAllRecords();
    const filtered = all
      .filter(r=>r.difficulty === lbSelectedDiff)
      .sort((a,b)=> b.score - a.score || (a.elapsedMs ?? Infinity) - (b.elapsedMs ?? Infinity) || new Date(b.date) - new Date(a.date))
      .slice(0, 10);
    list.innerHTML = '';
    if(filtered.length === 0){
      list.innerHTML = '<div class="history-row"><span class="history-date">아직 기록이 없어요</span></div>';
      return;
    }
    filtered.forEach((r, i)=>{
      const row = document.createElement('div');
      row.className = 'history-row';
      row.innerHTML = `<span class="history-date">${i+1}위 · ${r.name || '익명'} · Lesson ${r.lesson}</span><span class="history-stat">${r.solved}/${r.total} · ${r.score}pts${r.elapsedMs != null ? ' · ' + formatElapsed(r.elapsedMs) : ''}</span>`;
      list.appendChild(row);
    });
  }
  function openLeaderboard(){
    renderLbTabs();
    loadAndRenderLeaderboard();
    el('modalLeaderboard').classList.remove('hidden');
  }

  /* ---------------------------------------------------------------------
     Visitor counter (일일 / 총)
     - Counts once per browser per day (not every page refresh).
     - If LEADERBOARD_ENDPOINT is set, uses the same Apps Script backend
       (needs the 'visits' handling added — see setup guide at bottom).
     - Otherwise falls back to this-browser-only counting.
  --------------------------------------------------------------------- */
  function loadLocalVisits(){
    try{ return JSON.parse(localStorage.getItem(VISIT_LOCAL_KEY)) || { total:0, byDate:{} }; }
    catch(e){ return { total:0, byDate:{} }; }
  }
  function renderVisitCounter(todayCount, totalCount){
    const box = el('visitCounter');
    if(todayCount === null || totalCount === null){
      box.innerHTML = `<span>방문자 수를 불러올 수 없어요</span>`;
      return;
    }
    box.innerHTML = `<span>오늘 방문 ${todayCount}</span><span>누적 방문 ${totalCount}</span>`;
  }
  async function trackAndRenderVisits(){
    const todayStr = new Date().toISOString().slice(0,10);
    const lastVisit = localStorage.getItem(VISIT_LAST_KEY);
    const isNewVisitForThisBrowser = lastVisit !== todayStr;

    if(LEADERBOARD_ENDPOINT){
      if(isNewVisitForThisBrowser){
        try{
          await fetch(LEADERBOARD_ENDPOINT, { method:'POST', body: JSON.stringify({ type:'visit', date:new Date().toISOString() }) });
          localStorage.setItem(VISIT_LAST_KEY, todayStr);
        }catch(e){ /* will retry on next load */ }
      }
      try{
        const res = await fetch(`${LEADERBOARD_ENDPOINT}?type=visits`);
        const data = await res.json();
        renderVisitCounter(data.today ?? 0, data.total ?? 0);
      }catch(e){
        renderVisitCounter(null, null);
      }
    } else {
      const local = loadLocalVisits();
      if(isNewVisitForThisBrowser){
        local.total += 1;
        local.byDate[todayStr] = (local.byDate[todayStr] || 0) + 1;
        localStorage.setItem(VISIT_LOCAL_KEY, JSON.stringify(local));
        localStorage.setItem(VISIT_LAST_KEY, todayStr);
      }
      renderVisitCounter(local.byDate[todayStr] || 0, local.total);
    }
  }
  async function submitScoreToLeaderboard(){
    if(!state) return;
    const name = el('playerName').value.trim();
    if(!name){ showToast('이름을 입력해주세요'); return; }
    el('btnSubmitScore').disabled = true;
    el('btnSubmitScore').textContent = '등록 중…';
    await submitRecord({
      name,
      lesson: state.lesson,
      difficulty: state.difficulty,
      score: state.score,
      solved: state.solvedCount,
      total: state.words.length,
      elapsedMs: state.elapsedMs,
      date: new Date().toISOString()
    });
    el('btnSubmitScore').textContent = '등록 완료';
    showToast('순위표에 등록되었어요');
  }

  /* ---------------------------------------------------------------------
     Wiring
  --------------------------------------------------------------------- */
  el('btnPlay').addEventListener('click', ()=>startGame('practice'));
  el('btnRelax').addEventListener('click', ()=>startGame('relax'));
  el('btnHistoryStart').addEventListener('click', ()=>{ renderHistory(); el('modalHistory').classList.remove('hidden'); });
  el('btnHistoryTop').addEventListener('click', ()=>{ renderHistory(); el('modalHistory').classList.remove('hidden'); });
  el('closeHistory').addEventListener('click', ()=>el('modalHistory').classList.add('hidden'));
  el('btnLeaderboardStart').addEventListener('click', openLeaderboard);
  el('btnLeaderboardTop').addEventListener('click', openLeaderboard);
  el('closeLeaderboard').addEventListener('click', ()=>el('modalLeaderboard').classList.add('hidden'));
  el('btnSubmitScore').addEventListener('click', submitScoreToLeaderboard);

  el('btnReveal').addEventListener('click', useReveal);
  el('btnPause').addEventListener('click', pauseGame);
  el('btnResume').addEventListener('click', resumeGame);
  el('btnRestart').addEventListener('click', restartGame);
  el('btnQuitHome').addEventListener('click', quitToHome);

  el('btnShare').addEventListener('click', shareScore);
  el('btnPracticeAgain').addEventListener('click', ()=>startGame('practice'));
  el('btnBackHome').addEventListener('click', ()=>{
    screenEnd.classList.add('hidden');
    screenStart.classList.remove('hidden');
  });

  document.addEventListener('keydown', (e)=>{
    if(screenGame.classList.contains('hidden') || !state) return;
    if(e.key === 'Backspace'){
      const lastFilled = [...state.slots].reverse().find(s=>s.value !== null);
      if(lastFilled) removeSlotBack(lastFilled);
      e.preventDefault();
      return;
    }
    if(/^[a-zA-Z]$/.test(e.key)){
      const letter = e.key.toLowerCase();
      const tile = state.tiles.find(t=>!t.used && t.letter.toLowerCase() === letter);
      if(tile) placeTile(tile.id);
    }
  });

  renderSettings();
  trackAndRenderVisits();
})();
</script>

=============================================================================
순위표를 여러 사람(다른 컴퓨터/학생)과 공유하고 싶다면 (선택 사항)
=============================================================================
지금 이 파일은 정적인 HTML이라, 그 자체로는 서버가 없어서 브라우저(localStorage)에만
기록이 남습니다. 즉, GitHub Pages에 올려도 각자의 브라우저에만 기록이 저장되고
서로 공유되지는 않아요. 여러 사람이 같은 순위표를 보게 하려면 무료로 쓸 수 있는
작은 저장소(백엔드) 하나가 필요합니다. 구글 계정만 있으면 무료로 5분이면 만들 수
있는 Google Apps Script 방법을 안내해드릴게요.

1. sheets.google.com 에서 새 스프레드시트를 하나 만듭니다 (이름 예: "단어대장간 순위표").
2. 메뉴에서 확장 프로그램 > Apps Script 를 엽니다.
3. 기본으로 있는 코드를 지우고 아래 코드를 붙여넣습니다.

--------------------------------------------------------------------------
function doGet(e) {
  if (e.parameter.type === 'visits') {
    return ContentService.createTextOutput(JSON.stringify(getVisitCounts_()))
      .setMimeType(ContentService.MimeType.JSON);
  }
  const sheet = getSheet_();
  const rows = sheet.getDataRange().getValues();
  const headers = rows.shift();
  const data = rows.map(r => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });
  return ContentService.createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  const body = JSON.parse(e.postData.contents);
  if (body.type === 'visit') {
    recordVisit_(body.date);
    return ContentService.createTextOutput(JSON.stringify({ ok: true }))
      .setMimeType(ContentService.MimeType.JSON);
  }
  const sheet = getSheet_();
  sheet.appendRow([
    body.name || '', body.lesson || '', body.difficulty || '',
    body.score || 0, body.solved || 0, body.total || 0,
    body.elapsedMs || 0, body.date || new Date().toISOString()
  ]);
  return ContentService.createTextOutput(JSON.stringify({ ok: true }))
    .setMimeType(ContentService.MimeType.JSON);
}

function getSheet_() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sheet = ss.getSheetByName('leaderboard');
  if (!sheet) {
    sheet = ss.insertSheet('leaderboard');
    sheet.appendRow(['name','lesson','difficulty','score','solved','total','elapsedMs','date']);
  }
  return sheet;
}

function getVisitsSheet_() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sheet = ss.getSheetByName('visits');
  if (!sheet) {
    sheet = ss.insertSheet('visits');
    sheet.appendRow(['date']);
  }
  return sheet;
}

function recordVisit_(dateStr) {
  const sheet = getVisitsSheet_();
  sheet.appendRow([dateStr || new Date().toISOString()]);
}

function getVisitCounts_() {
  const sheet = getVisitsSheet_();
  const rows = sheet.getDataRange().getValues();
  rows.shift(); // header
  const tz = Session.getScriptTimeZone();
  const todayStr = Utilities.formatDate(new Date(), tz, 'yyyy-MM-dd');
  let today = 0;
  rows.forEach(r => {
    const d = new Date(r[0]);
    if (Utilities.formatDate(d, tz, 'yyyy-MM-dd') === todayStr) today++;
  });
  return { total: rows.length, today: today };
}
--------------------------------------------------------------------------

4. 오른쪽 위 "배포" > "새 배포"를 누르고, 유형은 "웹 앱"을 선택합니다.
5. "실행 계정"은 "나(본인)", "액세스 권한이 있는 사용자"는 "모든 사용자"로 설정합니다.
   (이렇게 해야 학생들 브라우저에서도 이 주소로 접속할 수 있어요.)
6. 배포하면 나오는 웹 앱 URL을 복사합니다 (.../exec 로 끝나는 주소).
7. 이 HTML 파일 안의 자바스크립트에서 아래 줄을 찾아
      const LEADERBOARD_ENDPOINT = '';
   따옴표 안에 방금 복사한 URL을 붙여넣고 저장합니다.
      const LEADERBOARD_ENDPOINT = 'https://script.google.com/macros/s/xxxx/exec';

   시트에 쌓이고, 순위표 화면에서 다 함께 볼 수 있습니다.

이미 리더보드용 Apps Script를 배포해두셨다면(방문자수 · 완료 시간 기능 추가 시):
- 위 코드로 기존 Apps Script 코드를 통째로 교체하세요 (visits 관련 함수, 그리고
  leaderboard 시트에 elapsedMs 열이 추가된 버전입니다). doGet/doPost 로직 자체는
  그대로고, 저장하는 열이 하나 늘었을 뿐이에요.
- 기존에 이미 leaderboard 시트가 만들어져 있다면, 시트 맨 위 헤더 행에 수동으로
  'elapsedMs' 열을 'total'과 'date' 사이에 하나 추가해주세요 (코드는 새 시트를
  자동으로 만들 때만 헤더를 써주기 때문에, 이미 있는 시트는 직접 추가해야 해요).
- 저장 후 "배포" > "배포 관리" 로 들어가서 연필(✏️) 아이콘을 누르고
  "새 버전"으로 업데이트하세요. **"새 배포"를 다시 누르면 URL이 바뀌니 주의하세요.**
  "새 버전"으로 업데이트하면 기존 URL(LEADERBOARD_ENDPOINT에 넣어두신 그 주소)이
  그대로 유지된 채 새 기능만 적용됩니다.
- 별도로 URL을 바꾸거나 새로 배포할 필요가 없습니다.

주의: 웹 앱 URL은 "모든 사용자"에게 열려 있으므로, 특별히 민감한 정보(실명, 개인정보)는
넣지 않는 걸 권장드려요. 닉네임 정도로 입력하게 안내하시는 걸 추천합니다.
